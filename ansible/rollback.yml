---
- hosts: server
  become: true
  tasks:
    - name: Stop the Node.js app
      command: pm2 stop my-node-app
      ignore_errors: yes

    - name: Delete PM2 process
      command: pm2 delete my-node-app
      ignore_errors: yes

    - name: Remove the application directory
      file:
        path: /home/ubuntu/my-node-app
        state: absent

    # PM2 Service is installed in the deploy, so I want to ensure it is removed.
    - name: Uninstall pm2
      npm:
        name: pm2
        state: absent
        global: yes

    # NodeJs and Npm are both installed in deploy, so I want to ensure they are removed.
    - name: Uninstall Node Installs
      apt:
        name:
          - nodejs
        state: absent
        purge: yes

    - name: Stop PostgreSQL service
      service:
        name: postgresql
        state: stopped
        enabled: no

    - name: Uninstall PostgreSQL
      apt:
        name:
          - postgresql
          - postgresql-contrib
        state: absent
        purge: yes
