name: Redeployment of K8s

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/csc820-mod10

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:latest
          platforms: linux/amd64,linux/arm64

      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v2"
        with:
          version: "latest" # Optional: 'latest' is the default

      - name: "Use gcloud CLI"
        run: |
          echo $GCP_SERVICE_ACCOUNT_KEY | base64 -d > gcp-service-account.json
          gcloud components install gke-gcloud-auth-plugin
          gcloud components install kubectl
          gcloud auth activate-service-account --key-file gcp-service-account.json
          gcloud container clusters get-credentials autopilot-cluster-1 --zone us-east1 --project graphic-charter-118902
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
