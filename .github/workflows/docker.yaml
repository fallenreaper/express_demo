name: Redeployment of K8s

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/csc820-mod10

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:latest
          platforms: linux/amd64,linux/arm64

      - name: Reapply yaml files
        uses: google/cloud-sdk:latest
        run: |
          echo $GCP_SERVICE_ACCOUNT_KEY | base64 -d > gcp-service-account.json
          gcloud auth activate-service-account --key-file gcp-service-account.json
          gcloud container clusters get-credentials <your-cluster-name> --zone <your-cluster-zone>
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml
